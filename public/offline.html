<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Chennai Smart Care</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #312e81 100%);
      color: #fff;
      padding: 1.5rem;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.12);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      border: 1px solid rgba(255,255,255,0.15);
      margin: 0 auto 2rem;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
    }

    .icon { font-size: 3.5rem; margin-bottom: 1rem; }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.75rem;
    }

    p {
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      font-size: 0.9375rem;
      margin-bottom: 1.75rem;
    }

    .actions { display: flex; flex-direction: column; gap: 0.75rem; }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #fff;
      color: #1d4ed8;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 1.5rem;
      border-radius: 0.875rem;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #25d366;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 1.5rem;
      border-radius: 0.875rem;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-whatsapp:active { transform: scale(0.98); }

    .btn-retry {
      background: none;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      font-size: 0.9375rem;
      padding: 0.875rem 1.5rem;
      border-radius: 0.875rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
    }
    .btn-retry:hover { border-color: rgba(255,255,255,0.6); color: #fff; }

    .divider {
      margin: 1.5rem 0 0;
      color: rgba(255,255,255,0.35);
      font-size: 0.8125rem;
    }

    .hours {
      margin-top: 0.5rem;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.5);
    }

    .wifi-animation {
      display: inline-block;
      position: relative;
      width: 48px;
      height: 48px;
      margin: 0 auto 0.5rem;
    }
    .wifi-animation::before,
    .wifi-animation::after {
      content: '';
      position: absolute;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    .wifi-animation::before { inset: 0; }
    .wifi-animation::after  { inset: 8px; animation-delay: 0.5s; }
    @keyframes ping {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo">🔧</div>

  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      No internet connection. To book an appliance repair or get immediate help,
      reach us directly — our team is available every day, 9AM to 9PM.
    </p>

    <div class="actions">
      <a href="tel:+919444900470" class="btn-primary">
        📞 Call +91 94449 00470
      </a>
      <a href="https://wa.me/919444900470?text=Hi%20Chennai%20Smart%20Care%2C%20I%20need%20help%20with%20appliance%20repair"
         class="btn-whatsapp">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp Us
      </a>
      <button class="btn-retry" onclick="window.location.reload()">
        ↻ Retry Connection
      </button>
    </div>

    <p class="divider">Chennai Smart Care</p>
    <p class="hours">Available 9:00 AM – 9:00 PM · 7 days a week</p>
  </div>

  <script>
    // Auto-retry every 30 seconds
    let retryCount = 0;
    const retryInterval = setInterval(() => {
      if (navigator.onLine) {
        clearInterval(retryInterval);
        window.location.reload();
      }
      retryCount++;
      if (retryCount >= 10) clearInterval(retryInterval); // Stop after 5 minutes
    }, 30000);

    // Listen for connection restore
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
